<div class="order-card">
    <div class="order-header">
        <div class="order-info">
            <h4>{{ order().service_title }}</h4>
            <span class="order-status" [class]="'order-status ' + order().status">{{ order().status }}</span>
        </div>
    </div>

    <div class="order-details">
        <div class="detail-item">
            <span class="detail-label">💬</span>
            <span class="detail-value">{{ order().message }}</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">📅</span>
            <span class="detail-value">{{ order().created_at | date:'dd MMM yyyy, HH:mm' }}</span>
        </div>
    </div>

    <div class="order-actions">
        <button class="delete-btn" (click)="onDelete()">🗑️ Delete</button>
    </div>
</div>
