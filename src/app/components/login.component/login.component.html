<div id="container">
    <!-- плашка ошибки авторизации (самый верх формы) -->
  <div *ngIf="!isAuth" class="auth-error-banner" @fadeIn>
    <h1>Invalid user or password</h1>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <!-- поле user -->
    <div class="form-field">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        placeholder="Enter login"
        autocomplete="username"
        [class.invalid]="username.invalid && (username.dirty || username.touched)"
      />
      <!-- сообщение валидации появляется сверху поля -->
      <div *ngIf="username.invalid && (username.dirty || username.touched)" class="validation-error">
        <ng-container *ngIf="username.errors?.['required']">Is required</ng-container>
        <ng-container *ngIf="username.errors?.['minlength']">At least 3 symbols</ng-container>
        <ng-container *ngIf="username.errors?.['pattern']">Only latin alphabet, nums and _</ng-container>
      </div>
    </div>

    <!-- поле password -->
    <div class="form-field">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter the password"
        autocomplete="current-password"
        [class.invalid]="password.invalid && (password.dirty || password.touched)"
      />
      <div *ngIf="password.invalid && (password.dirty || password.touched)" class="validation-error">
        <ng-container *ngIf="password.errors?.['required']">Is required</ng-container>
        <ng-container *ngIf="password.errors?.['minlength']">At least 6 symbols</ng-container>
        <ng-container *ngIf="password.errors?.['pattern']">Should contain alphabet and nums</ng-container>
      </div>
    </div>

    <!-- кнопка активна только при валидной форме -->
    <button
      type="submit"
      class="login-button"
      [disabled]="loginForm.invalid || isLoading"
      [class.loading]="isLoading"
    >
      <span *ngIf="!isLoading">Login</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>
  </form>
  <div class="register-link">
      <span>Don't have account?</span>
      <a routerLink="/registration">Register</a>
  </div>
</div>
