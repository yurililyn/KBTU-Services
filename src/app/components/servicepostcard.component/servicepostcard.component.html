<div class="card">
  <div class="content">
    <div class="category">{{ service().category_name }}</div>
    <h3>{{ service().title }}</h3>
    <p class="description">{{ service().description }}</p>
    <div class="bottom">
      <span class="price">{{ service().price }}₸</span>
      <div class="actions">
        <div class="rating-container" title="Средний рейтинг (кол-во отзывов)">
          <span class="star-icon">★</span>
          <span class="rating-value">{{ service().average_rating }}</span>
          <span class="votes-count">({{ service().total_votes }})</span>
        </div>
         
        <button class="edit-btn" (click)="openEdit()">✏️ Edit</button>
        <button class="delete-btn" (click)="onDelete()">🗑️ Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT POPUP -->
<div class="popup-overlay" *ngIf="showEditPopup" (click)="closeEdit()">
  <div class="popup-content" (click)="$event.stopPropagation()">
    <div class="popup-header">
      <h2>✏️ Edit service</h2>
      <button class="close-btn" (click)="closeEdit()">×</button>
    </div>
    <div class="popup-body">
      <div class="form-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="editData.title" placeholder="Service title" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="editData.description" rows="4" placeholder="Description"></textarea>
      </div>
      <div class="form-group">
        <label>Price (₸)</label>
        <input type="number" [(ngModel)]="editData.price" placeholder="Price" />
      </div>
    </div>
    <div class="popup-footer">
      <button class="cancel-btn" (click)="closeEdit()">Cancel</button>
      <button class="save-btn" (click)="saveEdit()">Save changes</button>
    </div>
  </div>
</div>
